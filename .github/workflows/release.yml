name: Release (Bismark Rust suite)

# ------------------------------------------------------------------
# Beta release machinery for the Bismark Rust SUITE (12 binaries + the
# bismark-io lib). Modeled on the Trim Galore Rust release workflow, adapted
# for a multi-binary workspace.
#
# Release invariant: never push a `bismark-rust-v*` tag manually — this workflow
# creates and pushes the tag itself. For validation, dispatch with dry_run=true:
# all destructive side effects (tag push, GHCR push, GH release) are suppressed.
#
# Versioning: the SUITE version is the single-source `rust/VERSION` file (NOT a
# crate version — the workspace is virtual). Tag = `bismark-rust-v<version>`
# (distinct from the Perl `v*` tags and the per-crate `bismark-io-v*` tags).
#
# Branch guard (beta track): prereleases only from `rust/iron-chancellor`
# (version carries a `-beta`/`-rc` suffix); GA (no suffix) only from `master`.
#
# NO crates.io publish: deferred to GA (the immutable-publish / no-bump-during-
# beta / exact-pin-cascade trap — see plans/06062026_rust-suite-packaging/PLAN.md).
# ------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build, test, validate without pushing tags/images or creating a release.'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-release:
    name: Check release
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
      is_dry_run: ${{ steps.check.outputs.is_dry_run }}
      version: ${{ steps.check.outputs.version }}        # suite version, e.g. 2.0.0-beta.1
      tag: ${{ steps.check.outputs.tag }}                # bismark-rust-v<version>
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          fetch-tags: true
      - name: Detect release
        id: check
        run: |
          RAW_VERSION=$(tr -d '[:space:]' < rust/VERSION)
          [ -n "$RAW_VERSION" ] || { echo "::error::rust/VERSION is empty"; exit 1; }
          IS_PRERELEASE=false
          [[ "$RAW_VERSION" == *-* ]] && IS_PRERELEASE=true

          # Branch guard: GA only from master; prereleases from iron-chancellor.
          if [ "${{ github.ref_name }}" = "master" ]; then
            : # GA (or prerelease) from master is allowed
          elif [ "${{ github.ref_name }}" = "rust/iron-chancellor" ] && [ "$IS_PRERELEASE" = "true" ]; then
            : # prereleases only from the integration branch
          else
            echo "::error::Release must be from master, or a prerelease (version with a '-' suffix) from rust/iron-chancellor; got ${{ github.ref_name }} with $RAW_VERSION"
            exit 1
          fi

          TAG="bismark-rust-v$RAW_VERSION"
          if [ "${{ inputs.dry_run }}" != "true" ] && git tag -l "$TAG" | grep -q .; then
            echo "::error::Tag $TAG already exists"; exit 1
          fi

          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "is_dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          echo "version=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Detected: $TAG (prerelease=$IS_PRERELEASE, dry_run=${{ inputs.dry_run }})"

  build-binaries:
    name: Build ${{ matrix.name }}
    needs: [check-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build the whole suite
        env:
          BISMARK_SUITE_VERSION: ${{ needs.check-release.outputs.version }}
        # Compile the `bismark` aligner with the in-process rammap backend ON so the shipped
        # binary's `--rammap_inprocess` opt-in is functional (default `--rammap`
        # stays subprocess), AND with `binseq-input` ON so the shipped binary can read
        # BINSEQ `.vbq` files (#1025 Phase 2 — a default `cargo build` rejects `.vbq`
        # fail-loud; release binaries decode it). `pkg/feature` syntax: both features
        # live only on bismark-aligner; this still builds all 14 workspace members, and
        # the other 11 binaries are byte-unaffected. The rammap-core git dep + the
        # binseq crates.io dep are fetched at build (network available on the runner).
        run: cargo build --release --locked --manifest-path rust/Cargo.toml --target ${{ matrix.target }} --features bismark-aligner/rammap-inprocess,bismark-aligner/binseq-input
      - name: Package the suite tarball
        id: package
        run: |
          ARCHIVE="bismark-rust-${{ needs.check-release.outputs.version }}-${{ matrix.name }}"
          BINDIR="rust/target/${{ matrix.target }}/release"
          mkdir -p "staging/${ARCHIVE}"
          for b in bismark deduplicate_bismark bismark_methylation_extractor \
                   bismark2bedGraph coverage2cytosine bismark_genome_preparation \
                   bam2nuc NOMe_filtering filter_non_conversion \
                   methylation_consistency bismark2report bismark2summary; do
            cp "${BINDIR}/${b}" "staging/${ARCHIVE}/"
          done
          cp license.txt "staging/${ARCHIVE}/LICENSE"
          cp rust/THIRD-PARTY-NOTICES.md "staging/${ARCHIVE}/"
          cp rust/README.md "staging/${ARCHIVE}/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" -C staging "${ARCHIVE}"
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          echo "archive=${ARCHIVE}.tar.gz" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          retention-days: 1

  smoke-test-binaries:
    name: Smoke test binaries (all 12)
    needs: [check-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: /tmp/binaries
      - name: Smoke test every binary
        run: |
          cd /tmp/binaries
          tar xzf bismark-rust-${{ needs.check-release.outputs.version }}-linux-x86_64.tar.gz
          DIR="bismark-rust-${{ needs.check-release.outputs.version }}-linux-x86_64"
          for b in bismark deduplicate_bismark bismark_methylation_extractor \
                   bismark2bedGraph coverage2cytosine bismark_genome_preparation \
                   bam2nuc NOMe_filtering filter_non_conversion \
                   methylation_consistency bismark2report bismark2summary; do
            echo "--- $b ---"
            "$DIR/$b" --version
            "$DIR/$b" --help > /dev/null
          done
          echo "✓ all 12 binaries smoke-tested"

  # ── crates.io publish (GA only) ───────────────────────────────────────────
  # Publishes the 14-member workspace to crates.io in dependency (DAG) order.
  # Runs on every REAL release, but the work is branch-gated INSIDE the script:
  #   - dry-run (any version): validate only — `cargo publish --workspace
  #     --dry-run` (resolves unpublished workspace siblings locally, so dependents
  #     verify-build) + structural asserts (member-coverage / version-presence /
  #     git-dep / topological-order). No OIDC. NB per-crate `cargo publish -p X
  #     --dry-run` does NOT work for a dependent (it resolves the dep from crates.io
  #     where the sibling isn't published yet) — hence `--workspace`.
  #   - prerelease real (beta): NO-OP. Betas are never published (the immutable-
  #     publish / exact-pin-cascade trap). Exiting 0 lets the downstream tag/
  #     `:latest` jobs proceed unchanged on the beta track.
  #   - GA real (non-prerelease, from master): classic `CARGO_REGISTRY_TOKEN`
  #     secret → ordered `cargo publish` L0 → L1 → L2, each verified-available
  #     before the next (cargo's built-in index-propagation wait).
  #
  # Publish DAG (verified GA-epic Phase 1 against the live Cargo.tomls):
  #   L0 (independent roots):  bismark-io, bismark-meta
  #   L1 (depend only on L0):  bismark-aligner bismark-dedup bismark-bedgraph
  #                            bismark-coverage2cytosine bismark-bam2nuc
  #                            bismark-filter-nonconversion bismark-nome-filtering
  #                            bismark-methylation-consistency
  #                            bismark-genome-preparation bismark-report bismark-summary
  #   L2 (publish LAST):       bismark-extractor (→ bedgraph + coverage2cytosine)
  #
  # SAFETY: docker-merge (moves `:latest`) and create-release (pushes the GA tag)
  # `needs:` this job, so on a GA publish FAILURE they are skipped — a partial
  # publish never strands a moved `:latest` or a pushed tag.
  #
  # PARTIAL-PUBLISH RUNBOOK (crates.io is yank-only — NO delete): a mid-cascade
  # failure leaves earlier crates permanently published. Do NOT retry the SAME
  # versions (republishing an existing version is rejected). Fix forward: patch
  # the failing crate(s), BUMP the affected crate version(s) (+ the dependent
  # exact-pins), and re-run from the first unpublished crate. The bare-`bismark`
  # reserve crate (OD-3) is published separately at the Ph5 cut.
  #
  # AUTH — classic token, NOT OIDC (deliberate, GA-epic Ph5 pre-flight): crates.io
  # Trusted Publishing (OIDC) CANNOT do a crate's FIRST-ever publish — it requires a
  # manual/token first publish per crate (name-squat prevention). At the 2.0.0 cut,
  # 12 of the 14 crates are brand-new, so the GA publish uses a classic scoped
  # `CARGO_REGISTRY_TOKEN` repo secret. A classic token also avoids OIDC's 30-min
  # token expiring mid-cascade across 14 sequential verify-build+publish steps.
  # POST-GA (2.0.1+): once every crate exists, configure a Trusted Publisher per
  # crate (repo + this workflow, + a GH Environment), then switch this job back to
  # OIDC (`rust-lang/crates-io-auth-action`) and drop the secret.
  publish-crates:
    name: Publish to crates.io (GA only)
    needs: [check-release, build-binaries, smoke-test-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (or validate) the workspace in DAG order
        working-directory: rust
        env:
          DRY_RUN: ${{ needs.check-release.outputs.is_dry_run }}
          IS_PRERELEASE: ${{ needs.check-release.outputs.is_prerelease }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          L0="bismark-io bismark-meta"
          L1="bismark-aligner bismark-dedup bismark-bedgraph bismark-coverage2cytosine bismark-bam2nuc bismark-filter-nonconversion bismark-nome-filtering bismark-methylation-consistency bismark-genome-preparation bismark-report bismark-summary"
          L2="bismark-extractor"
          # The `bismark` whole-suite meta-crate depends on every tool crate, so it
          # publishes LAST (after L2). Its own version is independent (2.x).
          L3="bismark"
          ORDER="$L0 $L1 $L2 $L3"

          if [ "$DRY_RUN" != "true" ] && [ "$IS_PRERELEASE" = "true" ]; then
            echo "Prerelease ($IS_PRERELEASE) — crates.io publish is deferred to the GA cut. No-op."
            exit 0
          fi

          # --- Invariant 0: ORDER covers EVERY workspace member exactly once. A
          # crate added to the workspace but forgotten here would silently never
          # publish; assert set-equality against the [workspace] members list.
          echo "::group::ORDER covers all workspace members"
          # `bismark[a-z0-9-]*` (not `bismark-…+`) so the bare `bismark` meta-crate member is captured too.
          members=$(grep -E '^members' Cargo.toml | grep -oE 'bismark[a-z0-9-]*' | sort -u)
          order_sorted=$(printf '%s\n' $ORDER | sort -u)
          if [ "$members" != "$order_sorted" ]; then
            echo "::error::publish ORDER does not match the [workspace] members:"
            diff <(echo "$members") <(echo "$order_sorted") || true
            exit 1
          fi
          # ORDER must list each crate exactly once (a duplicate would re-publish).
          n_order=$(printf '%s\n' $ORDER | wc -l | xargs)
          n_uniq=$(printf '%s\n' $ORDER | sort -u | wc -l | xargs)
          [ "$n_order" = "$n_uniq" ] || { echo "::error::ORDER has a duplicate crate ($n_order entries, $n_uniq unique)"; exit 1; }
          echo "✓ ORDER covers all $(echo "$members" | wc -l | xargs) workspace members, no duplicates"
          echo "::endgroup::"

          # --- Invariant 1: every intra-workspace dep carries a `version =`
          # (crates.io rejects a published crate whose path-dep has no version).
          echo "::group::version-presence on intra-workspace deps"
          bad_deps=$(for c in $ORDER; do grep -HE '^bismark-[a-z0-9-]+ *=' "$c/Cargo.toml"; done | grep -v 'version' || true)
          if [ -n "$bad_deps" ]; then
            echo "::error::these bismark-* path-deps lack a 'version =' (crates.io will reject the publish):"
            echo "$bad_deps"
            exit 1
          fi
          echo "✓ all intra-workspace deps carry a version"
          echo "::endgroup::"

          # --- Invariant 1b: NO dependency uses a git source without a `version =`.
          # crates.io rejects ANY git dep — even an optional, feature-gated one
          # (e.g. bismark-aligner's optional rammap-core git rev). Invariant 1's
          # bismark-* scan can't see third-party git deps, so guard them here.
          echo "::group::git-deps carry a version"
          git_unversioned=$(for c in $ORDER; do grep -HnE '(^|[,{[:space:]])git[[:space:]]*=' "$c/Cargo.toml"; done | grep -v 'version' || true)
          if [ -n "$git_unversioned" ]; then
            echo "::error::these git deps have no 'version =' (crates.io will reject the publish):"
            echo "$git_unversioned"
            exit 1
          fi
          echo "✓ all git deps carry a version"
          echo "::endgroup::"

          # --- Invariant 2: ORDER is a valid topological sort (each crate's
          # bismark-* deps appear EARLIER). Catches a wrong publish order, which
          # `cargo publish --dry-run` cannot (it resolves deps via local path).
          echo "::group::topological-order check"
          done_list=" "
          bad=0
          for c in $ORDER; do
            for dep in $(grep -oE '^bismark-[a-z0-9-]+' "$c/Cargo.toml" | sort -u); do
              case "$done_list" in
                *" $dep "*) : ;;
                *) echo "ORDER BUG: $c depends on $dep, which is not published earlier in ORDER"; bad=1 ;;
              esac
            done
            done_list="$done_list$c "
          done
          [ "$bad" = 0 ] || { echo "::error::publish ORDER is not a valid topological sort"; exit 1; }
          echo "✓ publish order is a valid topological sort"
          echo "::endgroup::"

          # --- Publish (real GA) or validate (dry-run) the workspace.
          if [ "$DRY_RUN" = "true" ]; then
            # Validate the WHOLE workspace in ONE dry-run. Modern cargo (>=1.90)
            # resolves unpublished workspace SIBLINGS locally, so each dependent's
            # verify-build works even though its intra-workspace deps aren't on the
            # registry yet. Per-crate `cargo publish -p X --dry-run` CANNOT do this:
            # for publishing it strips `path=` and resolves the dep from crates.io,
            # so a dependent (e.g. bismark-aligner needs `bismark-io =1.0.0`) fails
            # because that version isn't published yet — only betas are (this is what
            # the first 4c dry-run surfaced). `--workspace` computes the publish order
            # itself; the structural asserts above (member-coverage / version-presence
            # / git-dep / topo) still cover manifest + ordering correctness.
            echo "::group::validate workspace (cargo publish --workspace --dry-run)"
            cargo publish --workspace --locked --dry-run --allow-dirty
            echo "::endgroup::"
            echo "✓ DRY-RUN: workspace packaged + dry-published (siblings resolved locally); deps versioned; order valid"
          else
            # Fail LOUD + EARLY if the publish token secret is missing — before any
            # crate is published — so a forgotten secret can't strand a partial
            # cascade (crates.io is yank-only). Set it via: repo Settings → Secrets
            # and variables → Actions → CARGO_REGISTRY_TOKEN (a crates.io token
            # scoped publish-new + publish-update).
            if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
              echo "::error::CARGO_REGISTRY_TOKEN secret is empty — cannot publish. Add the crates.io token as a repo secret before the GA cut."
              exit 1
            fi
            # Real GA publish: ordered L0 → L1 → L2. RESUMABLE + RATE-LIMIT-AWARE:
            #  - SKIP any crate+version already on crates.io (so a re-run after a
            #    partial publish resumes cleanly — crates.io is yank-only, and
            #    re-publishing an existing version is a hard error).
            #  - crates.io throttles NEW crates (burst 5, then 1 per 10 min) and
            #    cargo has NO built-in 429 backoff, so on a 429 we sleep 11 min and
            #    retry (publishing >5 new crates ALWAYS trips this — rust-lang/crates.io#1643).
            #  - then wait for the crate to appear on the index before the next
            #    crate's verify-build tries to resolve it.
            ua='User-Agent: bismark-release'
            set +e   # manual retry/skip handling below (do not let -e abort mid-loop)
            fail=0
            for c in $ORDER; do
              cver=$(sed -n 's/^version = "\(.*\)"/\1/p' "$c/Cargo.toml" | head -1)
              if [ "$(curl -s -o /dev/null -w '%{http_code}' -H "$ua" "https://crates.io/api/v1/crates/$c/$cver")" = "200" ]; then
                echo "✓ $c $cver already on crates.io — skip (resume)"
                continue
              fi
              echo "::group::publish $c $cver"
              ok=0
              for attempt in $(seq 1 12); do
                out=$(cargo publish -p "$c" --locked 2>&1); rc=$?
                echo "$out"
                if [ $rc -eq 0 ]; then ok=1; break; fi
                if echo "$out" | grep -qiE 'already (exists|uploaded)|is already (uploaded|being)'; then
                  echo "✓ $c $cver already uploaded — treat as done"; ok=1; break
                fi
                if echo "$out" | grep -qiE '429|too many|rate limit'; then
                  echo "::warning::rate-limited on $c (attempt $attempt/12) — sleeping 11 min then retrying"
                  sleep 660; continue
                fi
                echo "::error::$c failed with a non-rate-limit error (see log above)"; break
              done
              echo "::endgroup::"
              if [ $ok -ne 1 ]; then fail=1; break; fi
              # Index-propagation wait (≤5 min) so the next crate can resolve this dep.
              for _ in $(seq 1 60); do
                [ "$(curl -s -o /dev/null -w '%{http_code}' -H "$ua" "https://crates.io/api/v1/crates/$c/$cver")" = "200" ] && break
                sleep 5
              done
            done
            set -e
            [ $fail -eq 0 ] || { echo "::error::crates.io publish incomplete — see the failed crate above"; exit 1; }
            echo "✓ PUBLISHED (or verified already-present) all 15 crates to crates.io in DAG order"
          fi

  docker-build:
    name: Docker ${{ matrix.platform }}
    needs: [check-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            BISMARK_SUITE_VERSION=${{ needs.check-release.outputs.version }}
          outputs: type=image,name=ghcr.io/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=${{ needs.check-release.outputs.is_dry_run != 'true' }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
      - name: Export digest
        if: needs.check-release.outputs.is_dry_run != 'true'
        # Strip the "sha256:" prefix so the artifact filename is bare hex —
        # actions/upload-artifact@v4 rejects ':' in paths, and the "Create
        # manifest" step reconstructs digests as @sha256:<filename>.
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        if: needs.check-release.outputs.is_dry_run != 'true'
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Docker merge + tag
    # publish-crates is in needs so a GA crates.io publish FAILURE skips this job
    # (default skip-propagation) — `:latest` is never moved onto an image whose
    # crates didn't publish. On the beta track publish-crates no-ops (succeeds),
    # so this still runs and moves `:beta`/`:<version>` as before.
    needs: [check-release, docker-build, publish-crates]
    if: needs.check-release.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with: { pattern: digests-*, path: /tmp/digests, merge-multiple: true }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest
        working-directory: /tmp/digests
        run: |
          V="${{ needs.check-release.outputs.version }}"
          if [ "${{ needs.check-release.outputs.is_prerelease }}" = "true" ]; then
            TAGS="-t ghcr.io/${{ env.IMAGE_NAME }}:beta -t ghcr.io/${{ env.IMAGE_NAME }}:$V"
          else
            TAGS="-t ghcr.io/${{ env.IMAGE_NAME }}:latest -t ghcr.io/${{ env.IMAGE_NAME }}:$V"
          fi
          docker buildx imagetools create $TAGS \
            $(printf 'ghcr.io/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  # Smoke-test the pushed multi-arch image (real runs only — dry_run never
  # pushes, so there's nothing to pull; the dry_run docker-build still validates
  # the Dockerfile *builds*). Verifies a suite binary + a bundled aligner resolve.
  smoke-test-docker:
    name: Smoke test Docker image
    needs: [check-release, docker-merge]
    if: needs.check-release.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
      - name: Pull + test
        run: |
          IMG="ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.check-release.outputs.version }}"
          # `bismark` is the version-probe WRAPPER (execs the real aligner for
          # everything else); the real aligner binary is `bismark.bin`.
          docker run --rm "$IMG" bismark --version
          docker run --rm "$IMG" bismark.bin --version
          docker run --rm "$IMG" bismark_methylation_extractor --version
          docker run --rm "$IMG" bowtie2 --version
          docker run --rm "$IMG" samtools --version | head -1
          # Canonical names (methylseq drop-in) resolve; `bismark --help` also
          # exercises the wrapper's exec of the real `bismark.bin`.
          docker run --rm "$IMG" bismark --help >/dev/null
          docker run --rm "$IMG" coverage2cytosine --help >/dev/null
          docker run --rm "$IMG" deduplicate_bismark --help >/dev/null
          # Version probe: BOTH methylseq parser shapes must capture EXACTLY the
          # suite version from `bismark` (GA: the wrapper reports the TRUE suite
          # version — at the 2.0.0 cut this is "2.0.0"; methylseq re-baselines its
          # version snapshots, OD-7). Compared against the release version (not a
          # hardcoded literal) so this stays correct for every later release/beta.
          EXPECT="${{ needs.check-release.outputs.version }}"
          p1=$(docker run --rm "$IMG" bismark --version | grep Version | sed -e 's/Bismark Version: v//' | xargs)
          p2=$(echo $(docker run --rm "$IMG" bismark -v 2>&1) | sed 's/^.*Bismark Version: v//; s/Copyright.*$//' | xargs)
          echo "version capture: parser1='$p1' parser2='$p2' (expect '$EXPECT')"
          [ "$p1" = "$EXPECT" ] || { echo "FAIL: align-module parser captured '$p1' (expected '$EXPECT')"; exit 1; }
          [ "$p2" = "$EXPECT" ] || { echo "FAIL: versions.yml parser captured '$p2' (expected '$EXPECT')"; exit 1; }
          # Tools methylseq shells out to (genomeprep → *-build; extractor → gzip).
          # NB assert each individually — `command -v a b c` only resolves the FIRST
          # operand (POSIX), so a single multi-arg call would silently pass.
          docker run --rm "$IMG" sh -c 'for t in gzip sed printf bowtie2-build hisat2-build samtools ps; do command -v "$t" >/dev/null || { echo "missing: $t"; exit 1; }; done' \
            || { echo "FAIL: a required co-resident tool is missing"; exit 1; }

  # Create the tag + a DRAFT release (gated on the image building OK). Drafting
  # means no PUBLIC release exists until binaries are uploaded + the image is
  # smoke-tested (finalize-release). NB the tag IS pushed here — a failure before
  # finalize leaves a draft + tag that must be deleted before re-running
  # (the check-release collision guard).
  create-release:
    name: Create tag + draft release
    # publish-crates is in needs so a GA crates.io publish FAILURE skips the tag
    # push + draft (nothing public is created on a partial publish). Betas no-op
    # publish-crates (succeeds), so the tag/draft still happen on that track.
    needs: [check-release, build-binaries, smoke-test-binaries, docker-build, publish-crates]
    if: needs.check-release.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag + draft release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ needs.check-release.outputs.is_prerelease == 'true' && '--prerelease' || '' }}
        run: |
          git tag "${{ needs.check-release.outputs.tag }}"
          git push origin "${{ needs.check-release.outputs.tag }}"
          gh release create "${{ needs.check-release.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "Bismark Rust suite ${{ needs.check-release.outputs.version }}" \
            --generate-notes --draft $PRERELEASE_FLAG

  upload-binaries:
    name: Upload binaries to draft release
    needs: [check-release, create-release, build-binaries]
    if: needs.check-release.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: binary-*, path: /tmp/binaries, merge-multiple: true }
      - env:
          GH_TOKEN: ${{ github.token }}
          # This job has no checkout, so gh can't infer the repo from a git
          # remote — set GH_REPO explicitly (else: "fatal: not a git repository").
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.check-release.outputs.tag }}" /tmp/binaries/*.tar.gz /tmp/binaries/*.sha256

  # Publish (un-draft) ONLY after binaries are uploaded AND the image passed its
  # smoke test — no public release without complete, validated artifacts.
  finalize-release:
    name: Finalize (publish) release
    needs: [check-release, upload-binaries, smoke-test-docker]
    if: needs.check-release.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          # No checkout here either — same GH_REPO fix as upload-binaries.
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.check-release.outputs.tag }}" --draft=false
